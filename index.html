<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    /* Navigation */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 60px;
      background:#111827;
      position:sticky;
      top:0;
    }

    .logo{
      font-size:24px;
      font-weight:bold;
      color:#38bdf8;
    }

    .nav-links{
      list-style:none;
      display:flex;
      gap:25px;
    }

    .nav-links a{
      text-decoration:none;
      color:white;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:#38bdf8;
    }

    /* Hero Section */
    .hero{
      height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero-content h1{
      font-size:60px;
      margin-bottom:10px;
    }

    .hero-content h2{
      font-size:32px;
      color:#38bdf8;
      margin-bottom:15px;
    }

    .hero-content p{
      font-size:20px;
      color:#cbd5e1;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      padding:12px 24px;
      background:#38bdf8;
      color:black;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
    }

    @media(max-width:768px){
      nav{
        flex-direction:column;
        gap:15px;
      }

      .hero-content h1{
        font-size:42px;
      }

      .hero-content h2{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav>
    <div class="logo">Parvathy</div>

   <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>

      <li><a href="certification.html">Certificaton</a></li>

      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="https://github.com/p456arvathy" target="_blank">GitHub</a></li>
    </ul>
  </nav>

  <!-- Home Page -->
  <section class="hero">
    <div class="hero-content">
      <h1>Parvathy</h1>
      <h2>Frontend Developer</h2>
      <p>
        Building modern, responsive and creative websites.
      </p>

      <a href="https://github.com/p456arvathy" class="btn" target="_blank">
        View GitHub
      </a>
    </div>
  </section>
