<!-- Contact Section -->
<section id="contact" style="padding:80px 20px; background:#111827; color:white;">

  <div style="max-width:800px; margin:auto; text-align:center;">

    <h2 style="
      font-size:40px;
      margin-bottom:25px;
      color:#38bdf8;
    ">
      Contact Me
    </h2>

    <p style="
      color:#cbd5e1;
      margin-bottom:40px;
      font-size:18px;
    ">
      Let’s connect and collaborate on exciting projects.
    </p>

    <div style="
      display:flex;
      flex-direction:column;
      gap:20px;
    ">

      <!-- Email -->
      <div style="
        background:#1e293b;
        padding:20px;
        border-radius:15px;
      ">
        <h3 style="color:#38bdf8; margin-bottom:10px;">
          Email
        </h3>

        <a href="mailto:yourmail@example.com"
           style="
            color:#cbd5e1;
            text-decoration:none;
            font-size:17px;
           ">
          yourmail@example.com
        </a>
      </div>

      <!-- LinkedIn -->
      <div style="
        background:#1e293b;
        padding:20px;
        border-radius:15px;
      ">
        <h3 style="color:#38bdf8; margin-bottom:10px;">
          LinkedIn
        </h3>

        <a href="https://linkedin.com/in/yourusername"
           target="_blank"
           style="
            color:#cbd5e1;
            text-decoration:none;
            font-size:17px;
           ">
          linkedin.com/in/yourusername
        </a>
      </div>

      <!-- GitHub -->
      <div style="
        background:#1e293b;
        padding:20px;
        border-radius:15px;
      ">
        <h3 style="color:#38bdf8; margin-bottom:10px;">
          GitHub
        </h3>

        <a href="https://github.com/yourusername"
           target="_blank"
           style="
            color:#cbd5e1;
            text-decoration:none;
            font-size:17px;
           ">
          github.com/yourusername
        </a>
      </div>

    </div>

  </div>

</section>
